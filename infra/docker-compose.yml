services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: project_b
      POSTGRES_USER: project_b
      POSTGRES_PASSWORD: project_b
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    image: python:3.11-slim
    working_dir: /workspace
    command: sh -lc "pip install -e . && alembic upgrade head && uvicorn apps.api.main:app --host 0.0.0.0 --port 8000"
    environment:
      PROJECT_DATABASE_URL: postgresql+psycopg://project_b:project_b@postgres:5432/project_b
      PROJECT_AUTO_CREATE_SCHEMA: "false"
    ports:
      - "8000:8000"
    volumes:
      - ..:/workspace
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
